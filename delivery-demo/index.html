function useTyping(text,delay=0,speed=45){
  const[displayed,setDisplayed]=useState("");
  useEffect(()=>{
    setDisplayed("");let i=0;let timeout;
    const st=setTimeout(()=>{
      const type=()=>{if(i<=text.length){setDisplayed(text.slice(0,i));i++;timeout=setTimeout(type,speed+Math.random()*30)}};
      type();
    },delay);
    return()=>{clearTimeout(st);clearTimeout(timeout)};
  },[text,delay,speed]);
  return displayed;
}

function TypedField({label,value,icon,delay=0,speed=40}){
  const typed=useTyping(value,delay,speed);
  const[show,setShow]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShow(true),Math.max(0,delay-200));return()=>clearTimeout(t)},[delay]);
  return(
    <div style={{marginBottom:6,opacity:show?1:0,transition:"opacity 0.3s ease"}}>
      <div style={{color:"rgba(26,26,26,0.5)",fontSize:9,marginBottom:2,fontWeight:500}}>{label}</div>
      <div style={{background:"#fff",border:"1px solid rgba(0,0,0,0.08)",borderRadius:6,padding:"5px 8px",display:"flex",alignItems:"center",gap:4,minHeight:22}}>
        {icon&&<Ic name={icon} size={11} color="rgba(26,26,26,0.5)"/>}
        <span style={{color:typed?"rgba(26,26,26,0.8)":"rgba(26,26,26,0.25)",fontSize:10}}>
          {typed}
          {typed.length<value.length&&<span style={{opacity:0.5,animation:"blink 0.8s step-end infinite"}}>|</span>}
        </span>
      </div>
    </div>
  );
}

function HiBox({style:s}){

}

function TapLabel({label,style:s}){

      <div style={{background:"#fff",boxShadow:"0 8px 30px rgba(0,0,0,0.14)",borderRadius:14,padding:12}}>
        <div style={{color:O,fontSize:10,fontWeight:700}}>Chez le client</div>
        <div style={{color:"#1A1A1A",fontSize:11,marginTop:6}}>Confirmer la livraison</div>
        <TypedField label="Code client (si requis)" value="4829" delay={400} speed={80}/>
        <div style={{marginTop:6,background:"#B8860B",borderRadius:8,padding:"9px",textAlign:"center",position:"relative"}}>
          <span style={{color:"#1A1A1A",fontSize:11,fontWeight:700}}>Confirmer la livraison</span>
          <HiBox style={{top:-3,left:-3,right:-3,bottom:-3,borderRadius:10}}/>
        </div>
      </div>
    </div>
    <TabBar tabs={DT} activeIndex={0}/>
  </div>
)}

function S9(){return(
  <div style={{flex:1,position:"relative",paddingBottom:48}}>
    <MapBg client/>
    <div style={{position:"absolute",inset:0,bottom:48,display:"flex",alignItems:"center",justifyContent:"center",zIndex:5}}>
      <div style={{textAlign:"center",background:"rgba(0,0,0,0.7)",borderRadius:14,padding:"16px 20px"}}>
        <Ic name="check" size={30} color="#E8B839"/>
        <div style={{color:"#E8B839",fontSize:13,fontWeight:700,marginTop:8}}>Livraison terminée</div>
      </div>
    </div>
    <TabBar tabs={DT} activeIndex={0}/>
  </div>
)}

function S10(){return(
  <div style={{flex:1,position:"relative",paddingBottom:48}}>
    <div style={{padding:"8px 12px",borderBottom:"1px solid rgba(0,0,0,0.08)"}}>
      <span style={{color:"#1A1A1A",fontSize:12,fontWeight:600}}>Gains</span>
    </div>
    <div style={{padding:12}}>
      <div style={{color:O,fontSize:18,fontWeight:800}}>12 400 FCFA</div>
      <div style={{color:"rgba(26,26,26,0.5)",fontSize:9,marginTop:4}}>Cette semaine</div>
      <div style={{marginTop:12,background:"rgba(0,0,0,0.05)",borderRadius:8,padding:10}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}>
          <span style={{color:"rgba(26,26,26,0.6)"}}>Course #2841</span>
          <span style={{color:O,fontWeight:700}}>+1 200 F</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,marginTop:6}}>
          <span style={{color:"rgba(26,26,26,0.6)"}}>Course #2835</span>
          <span style={{color:O,fontWeight:700}}>+950 F</span>
        </div>
      </div>
    </div>
    <TabBar tabs={DT} activeIndex={2} highlightIndex={2}/>
  </div>
)}

const allS=[S1,S2,S3,S4,S5,S6,S7,S8,S9,S10];

function App(){
  const[cur,setCur]=useState(0);
  const[playing,setPlaying]=useState(true);
  const[sKey,setSKey]=useState(0);

  useEffect(()=>{
    if(!playing)return;
    const t=setTimeout(()=>{
      setCur(p=>{const n=(p+1)%steps.length;setSKey(k=>k+1);return n});
    },steps[cur].dur);
    return()=>clearTimeout(t);
  },[cur,playing]);

  const go=useCallback(i=>{setCur(i);setSKey(k=>k+1)},[]);
  const Scr=allS[cur];

  // PostMessage for parent sync (embed mode)
  useEffect(()=>{
    if(!isEmbed||!window.parent)return;
    try{window.parent.postMessage({type:"demoSlideChange",index:cur,playing,totalSteps:steps.length},"*");}catch(_){}
  },[cur,playing]);

  useEffect(()=>{
    if(!isEmbed)return;
    const handler=e=>{
      try{
        const d=e.data;
        if(d&&d.type==="demoGo"){setCur(Math.max(0,Math.min(d.index||0,steps.length-1)));setSKey(k=>k+1);}
        else if(d&&d.type==="demoPlayPause"){setPlaying(!!d.playing);}
      }catch(_){}
    };
    window.addEventListener("message",handler);
    return()=>window.removeEventListener("message",handler);
  },[]);

  useEffect(()=>{if(isEmbed&&window.parent){try{window.parent.postMessage({type:"demoEmbedReady"},"*");}catch(_){}}},[]);

  // EMBED MINIMAL: screen only (steps/controls rendered by parent)
  if(isEmbed&&isMinimal){
    return(
      <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:"#F5F0E6",position:"relative",paddingTop:32}}>
        <div key={sKey} style={{flex:1,display:"flex",flexDirection:"column",animation:"screenSlide 0.3s ease"}}>
          <Scr/>
        </div>
      </div>
    );
  }

  // EMBED FULL: screens with step overlay (legacy)
  if(isEmbed){
    return(
      <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:"#F5F0E6",position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,zIndex:200,background:"linear-gradient(to bottom,rgba(0,0,0,0.8),transparent)",padding:"8px 12px 16px",pointerEvents:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{background:`linear-gradient(135deg,${O},${OD})`,borderRadius:6,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{color:"#1A1A1A",fontSize:12,fontWeight:800}}>{cur+1}</span>
            </div>
            <div>
              <div style={{color:"#1A1A1A",fontSize:11,fontWeight:700}}>{steps[cur].label}</div>
              <div style={{color:O,fontSize:8,fontWeight:500}}>{steps[cur].sub}</div>
            </div>
          </div>
        </div>
        <div key={sKey} style={{flex:1,display:"flex",flexDirection:"column",animation:"screenSlide 0.3s ease",paddingTop:50}}>
          <Scr/>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(0,0,0,0.04)",zIndex:200}}>
          <div key={`p-${cur}-${sKey}`} style={{height:"100%",background:`linear-gradient(to right,${O},${OD})`,borderRadius:2,animation:`progressFill ${steps[cur].dur}ms linear`,width:"100%"}}/>
        </div>
      </div>
    );
  }

  // STANDALONE MODE: with controls
  return(
    <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#F5F0E6",padding:16}}>
      <div style={{textAlign:"center",marginBottom:12}}>
        <span style={{color:O,fontSize:20,fontWeight:800,letterSpacing:-0.5}}>AFROBITE</span>
        <div style={{color:"rgba(26,26,26,0.45)",fontSize:11,marginTop:2}}>Application livreur AfroBite</div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:"rgba(212,160,23,0.06)",borderRadius:12,padding:"8px 18px",border:"1.5px solid rgba(212,160,23,0.15)"}}>
        <div style={{background:`linear-gradient(135deg,${O},${OD})`,borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(212,160,23,0.3)"}}>
          <span style={{color:"#1A1A1A",fontSize:16,fontWeight:800}}>{cur+1}</span>
        </div>
        <div>
          <div style={{color:"#1A1A1A",fontSize:14,fontWeight:700}}>{steps[cur].label}</div>
          <div style={{color:O,fontSize:10,fontWeight:500,marginTop:1}}>{steps[cur].sub}</div>
        </div>
      </div>

      {/* Screen in a simple container */}
      <div style={{width:280,height:520,borderRadius:12,overflow:"hidden",background:"#F5F0E6",position:"relative"}}>
        <div key={sKey} style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",animation:"screenSlide 0.3s ease"}}>
          <Scr/>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(0,0,0,0.04)",zIndex:40}}>
          <div key={`p-${cur}-${sKey}`} style={{height:"100%",background:`linear-gradient(to right,${O},${OD})`,borderRadius:2,animation:playing?`progressFill ${steps[cur].dur}ms linear`:"none",width:playing?"100%":"0%"}}/>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:16}}>
        <button onClick={()=>go((cur-1+steps.length)%steps.length)} style={{width:36,height:36,borderRadius:9999,border:"1px solid rgba(0,0,0,0.1)",background:"rgba(0,0,0,0.05)",color:"rgba(26,26,26,0.55)",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <button onClick={()=>setPlaying(!playing)} style={{width:44,height:44,borderRadius:9999,border:`2px solid ${O}`,background:playing?O:"transparent",color:"#1A1A1A",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:playing?"0 2px 12px rgba(212,160,23,0.3)":"none"}}>{playing?"⏸":"▶"}</button>
        <button onClick={()=>go((cur+1)%steps.length)} style={{width:36,height:36,borderRadius:9999,border:"1px solid rgba(0,0,0,0.1)",background:"rgba(0,0,0,0.05)",color:"rgba(26,26,26,0.55)",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>→</button>
      </div>

      <div style={{display:"flex",gap:4,marginTop:12}}>
        {steps.map((_,i)=>
          <button key={i} onClick={()=>go(i)} style={{width:i===cur?24:7,height:7,borderRadius:4,border:"none",background:i===cur?O:i<cur?"rgba(212,160,23,0.3)":"rgba(0,0,0,0.12)",cursor:"pointer",transition:"all 0.3s",boxShadow:i===cur?"0 0 8px rgba(212,160,23,0.3)":"none"}}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
