function useTyping(text,delay=0,speed=45){
  const[displayed,setDisplayed]=useState("");
  useEffect(()=>{
    setDisplayed("");let i=0;let timeout;
    const st=setTimeout(()=>{
      const type=()=>{if(i<=text.length){setDisplayed(text.slice(0,i));i++;timeout=setTimeout(type,speed+Math.random()*30)}};
      type();
    },delay);
    return()=>{clearTimeout(st);clearTimeout(timeout)};
  },[text,delay,speed]);
  return displayed;
}

function TypedField({label,value,icon,delay=0,speed=40}){
  const typed=useTyping(value,delay,speed);
  const[show,setShow]=useState(false);
  useEffect(()=>{const t=setTimeout(()=>setShow(true),Math.max(0,delay-200));return()=>clearTimeout(t)},[delay]);
  return(
    <div style={{marginBottom:6,opacity:show?1:0,transition:"opacity 0.3s ease"}}>
      <div style={{color:"rgba(255,255,255,0.4)",fontSize:9,marginBottom:2,fontWeight:500}}>{label}</div>
      <div style={{background:"rgba(255,255,255,0.06)",borderRadius:6,padding:"5px 8px",display:"flex",alignItems:"center",gap:4,minHeight:22}}>
        {icon&&<Ic name={icon} size={11} color="rgba(255,255,255,0.45)"/>}
        <span style={{color:typed?"rgba(255,255,255,0.75)":"rgba(255,255,255,0.15)",fontSize:10}}>
          {typed}
          {typed.length<value.length&&<span style={{opacity:0.5,animation:"blink 0.8s step-end infinite"}}>|</span>}
        </span>
      </div>
    </div>
  );
}

function HiBox({style:s}){

}

const allS=[S1,S1B,S2,S3,S4,S5,S6,S7,S8,S9,S10];

function App(){
  const[cur,setCur]=useState(0);
  const[playing,setPlaying]=useState(true);
  const[sKey,setSKey]=useState(0);

  useEffect(()=>{
    if(!playing)return;
    const t=setTimeout(()=>{
      setCur(p=>{const n=(p+1)%steps.length;setSKey(k=>k+1);return n});
    },steps[cur].dur);
    return()=>clearTimeout(t);
  },[cur,playing]);

  const go=useCallback(i=>{setCur(i);setSKey(k=>k+1)},[]);
  const Scr=allS[cur];

  // PostMessage for parent sync (embed mode)
  useEffect(()=>{
    if(!isEmbed||!window.parent)return;
    try{window.parent.postMessage({type:"demoSlideChange",index:cur,playing,totalSteps:steps.length},"*");}catch(_){}
  },[cur,playing]);

  useEffect(()=>{
    if(!isEmbed)return;
    const handler=e=>{
      try{
        const d=e.data;
        if(d&&d.type==="demoGo"){setCur(Math.max(0,Math.min(d.index||0,steps.length-1)));setSKey(k=>k+1);}
        else if(d&&d.type==="demoPlayPause"){setPlaying(!!d.playing);}
      }catch(_){}
    };
    window.addEventListener("message",handler);
    return()=>window.removeEventListener("message",handler);
  },[]);

  useEffect(()=>{if(isEmbed&&window.parent){try{window.parent.postMessage({type:"demoEmbedReady"},"*");}catch(_){}}},[]);

  // EMBED MINIMAL: screen only (steps/controls rendered by parent)
  if(isEmbed&&isMinimal){
    return(
      <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:"#000",position:"relative",paddingTop:32}}>
        <div key={sKey} style={{flex:1,display:"flex",flexDirection:"column",animation:"screenSlide 0.3s ease"}}>
          <Scr/>
        </div>
      </div>
    );
  }

  // EMBED FULL: screens with step overlay (legacy)
  if(isEmbed){
    return(
      <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",background:"#000",position:"relative"}}>
        <div style={{position:"absolute",top:0,left:0,right:0,zIndex:200,background:"linear-gradient(to bottom,rgba(0,0,0,0.8),transparent)",padding:"8px 12px 16px",pointerEvents:"none"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div style={{background:`linear-gradient(135deg,${O},${OD})`,borderRadius:6,width:24,height:24,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <span style={{color:"#fff",fontSize:12,fontWeight:800}}>{cur+1}</span>
            </div>
            <div>
              <div style={{color:"#fff",fontSize:11,fontWeight:700}}>{steps[cur].label}</div>
              <div style={{color:O,fontSize:8,fontWeight:500}}>{steps[cur].sub}</div>
            </div>
          </div>
        </div>
        <div key={sKey} style={{flex:1,display:"flex",flexDirection:"column",animation:"screenSlide 0.3s ease",paddingTop:50}}>
          <Scr/>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.03)",zIndex:200}}>
          <div key={`p-${cur}-${sKey}`} style={{height:"100%",background:`linear-gradient(to right,${O},${OD})`,borderRadius:2,animation:`progressFill ${steps[cur].dur}ms linear`,width:"100%"}}/>
        </div>
      </div>
    );
  }

  // STANDALONE MODE: with controls
  return(
    <div style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:"#0a0a0a",padding:16}}>
      <div style={{textAlign:"center",marginBottom:12}}>
        <span style={{color:O,fontSize:20,fontWeight:800,letterSpacing:-0.5}}>AFROBITE</span>
        <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:2}}>Application restaurant AfroBite</div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,background:"rgba(212,160,23,0.06)",borderRadius:12,padding:"8px 18px",border:"1.5px solid rgba(212,160,23,0.15)"}}>
        <div style={{background:`linear-gradient(135deg,${O},${OD})`,borderRadius:8,width:32,height:32,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 2px 10px rgba(212,160,23,0.3)"}}>
          <span style={{color:"#fff",fontSize:16,fontWeight:800}}>{cur+1}</span>
        </div>
        <div>
          <div style={{color:"#fff",fontSize:14,fontWeight:700}}>{steps[cur].label}</div>
          <div style={{color:O,fontSize:10,fontWeight:500,marginTop:1}}>{steps[cur].sub}</div>
        </div>
      </div>

      {/* Screen in a simple container */}
      <div style={{width:280,height:520,borderRadius:12,overflow:"hidden",background:"#000",position:"relative"}}>
        <div key={sKey} style={{width:"100%",height:"100%",display:"flex",flexDirection:"column",animation:"screenSlide 0.3s ease"}}>
          <Scr/>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,height:3,background:"rgba(255,255,255,0.03)",zIndex:40}}>
          <div key={`p-${cur}-${sKey}`} style={{height:"100%",background:`linear-gradient(to right,${O},${OD})`,borderRadius:2,animation:playing?`progressFill ${steps[cur].dur}ms linear`:"none",width:playing?"100%":"0%"}}/>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,marginTop:16}}>
        <button onClick={()=>go((cur-1+steps.length)%steps.length)} style={{width:36,height:36,borderRadius:9999,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>←</button>
        <button onClick={()=>setPlaying(!playing)} style={{width:44,height:44,borderRadius:9999,border:`2px solid ${O}`,background:playing?O:"transparent",color:"#fff",fontSize:15,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",boxShadow:playing?"0 2px 12px rgba(212,160,23,0.3)":"none"}}>{playing?"⏸":"▶"}</button>
        <button onClick={()=>go((cur+1)%steps.length)} style={{width:36,height:36,borderRadius:9999,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>→</button>
      </div>

      <div style={{display:"flex",gap:4,marginTop:12}}>
        {steps.map((_,i)=>
          <button key={i} onClick={()=>go(i)} style={{width:i===cur?24:7,height:7,borderRadius:4,border:"none",background:i===cur?O:i<cur?"rgba(212,160,23,0.3)":"rgba(255,255,255,0.06)",cursor:"pointer",transition:"all 0.3s",boxShadow:i===cur?"0 0 8px rgba(212,160,23,0.3)":"none"}}/>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
